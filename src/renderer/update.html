<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>업데이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Malgun Gothic", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }
    .container {
      text-align: center;
      padding: 24px;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
      color: #60a5fa;
      margin-bottom: 16px;
    }
    .status {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 12px;
    }
    .progress-bar {
      width: 240px;
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      overflow: hidden;
      margin: 0 auto;
    }
    .progress-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .percent {
      font-size: 11px;
      color: #64748b;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">오늘시간표</div>
    <div class="status" id="status">업데이트 확인 중...</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
    <div class="percent" id="percent"></div>
  </div>
  <script>
    window.electronAPI?.on("update-status", (msg) => {
      document.getElementById("status").textContent = msg;
    });
    window.electronAPI?.on("update-progress", (percent) => {
      document.getElementById("progress").style.width = percent + "%";
      document.getElementById("percent").textContent = Math.round(percent) + "%";
    });
  </script>
</body>
</html>
